<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Hypomnema — GitHub social card">
  <title>Hypomnema — Don't take notes. Let Claude synthesize them.</title>

  <!-- Background: parchment with subtle vignette -->
  <defs>
    <radialGradient id="parchment" cx="50%" cy="40%" r="75%">
      <stop offset="0%"  stop-color="#FFFBEB"/>
      <stop offset="70%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#parchment)"/>

  <!-- Faint baseline rules (manuscript paper feel) -->
  <g stroke="#92400E" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <!-- Logo mark (left) -->
  <g transform="translate(120 168) scale(0.59375)">
    <rect width="512" height="512" rx="96" fill="none"/>
    <g fill="#171717">
      <rect x="104" y="112" width="56" height="288"/>
      <rect x="84"  y="104" width="96" height="16"/>
      <rect x="80"  y="100" width="104" height="6"/>
      <rect x="84"  y="392" width="96" height="16"/>
      <rect x="80"  y="406" width="104" height="6"/>
      <rect x="352" y="112" width="56" height="288"/>
      <rect x="332" y="104" width="96" height="16"/>
      <rect x="328" y="100" width="104" height="6"/>
      <rect x="332" y="392" width="96" height="16"/>
      <rect x="328" y="406" width="104" height="6"/>
    </g>
    <g transform="translate(160 208)">
      <ellipse cx="96" cy="80" rx="130" ry="16" fill="#F59E0B" fill-opacity="0.22"/>
      <path d="M 4 26 L 96 12 L 96 86 L 4 96 Z"   fill="#F59E0B" stroke="#171717" stroke-width="4" stroke-linejoin="round"/>
      <path d="M 188 26 L 96 12 L 96 86 L 188 96 Z" fill="#F59E0B" stroke="#171717" stroke-width="4" stroke-linejoin="round"/>
      <line x1="96" y1="12" x2="96" y2="86" stroke="#171717" stroke-width="4" stroke-linecap="round"/>
      <g stroke="#171717" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round">
        <line x1="22"  y1="42" x2="84"  y2="32"/>
        <line x1="22"  y1="56" x2="84"  y2="46"/>
        <line x1="22"  y1="70" x2="68"  y2="62"/>
        <line x1="108" y1="32" x2="170" y2="42"/>
        <line x1="108" y1="46" x2="170" y2="56"/>
        <line x1="108" y1="62" x2="156" y2="70"/>
      </g>
    </g>
  </g>

  <!-- Text block (right) -->
  <g font-family="Georgia, 'Times New Roman', 'Noto Serif KR', serif" fill="#171717">
    <!-- Project name -->
    <text x="488" y="290" font-size="104" font-weight="700" letter-spacing="-1.5">Hypomnema</text>

    <!-- Tagline -->
    <text x="492" y="340" font-size="28" font-weight="400" fill-opacity="0.78" letter-spacing="0.4">
      LLM-native personal wiki for Claude Code
    </text>

    <!-- Slogan with amber underline -->
    <text x="492" y="420" font-size="30" font-weight="600" font-style="italic">
      Don&#39;t take notes. Let Claude synthesize them.
    </text>
    <rect x="492" y="432" width="544" height="4" fill="#F59E0B"/>

    <!-- Footer chip -->
    <g transform="translate(492 480)">
      <rect width="304" height="40" rx="8" fill="#171717"/>
      <text x="18" y="27" font-size="17" font-weight="500" fill="#FFFBEB" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
        npm install -g hypomnema
      </text>
    </g>
  </g>
</svg>
