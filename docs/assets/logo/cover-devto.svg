  <!-- Text right -->
  <g font-family="Georgia, 'Times New Roman', 'Noto Serif KR', serif" fill="#171717">
    <text x="340" y="195" font-size="72" font-weight="700" letter-spacing="-1.2">Hypomnema</text>
    <text x="342" y="232" font-size="20" font-weight="400" fill-opacity="0.78">
      LLM-native personal wiki for Claude Code
    </text>

    <text x="342" y="296" font-size="22" font-weight="600" font-style="italic">
      Don&#39;t take notes. Let Claude synthesize them.
    </text>
    <rect x="342" y="306" width="416" height="3" fill="#F59E0B"/>

    <g transform="translate(342 332)">
      <rect width="280" height="36" rx="6" fill="#171717"/>
      <text x="16" y="24" font-size="16" font-weight="500" fill="#FFFBEB" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
