name: Nightly

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  verify-pages:
    # Checks verify_by / verify_by_date frontmatter fields only.
    # Does NOT detect semantic staleness, broken external links, or
    # pages that lack verify_by entirely (verify.mjs flags those separately).
    name: Verify pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Init wiki
        run: |
          node scripts/init.mjs \
            --hypo-dir=/tmp/wiki-nightly \
            --no-hooks --no-git-init
      - name: Seed verify fixture
        run: |
          printf '%s\n' \
            '---' \
            'title: Verify Fixture' \
            'type: concept' \
            'updated: 2026-01-01' \
            'verify_by: Is this fixture still accurate?' \
            'verify_by_date: 2099-12-31' \
            '---' \
            '# Verify Fixture' \
            'A synthetic fixture used by nightly verify-pages CI.' \
            > /tmp/wiki-nightly/pages/verify-fixture.md
      - name: Verify all pages
        run: |
          node scripts/verify.mjs \
            --hypo-dir=/tmp/wiki-nightly \
            --json

  audit-smoke:
    # Lane E smoke check: session-audit + weekly-report must run end-to-end on
    # an empty wiki without crashing. Real data is dogfooded locally; CI just
    # guards against syntax/import regressions.
    name: Audit smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Init wiki
        run: |
          node scripts/init.mjs \
            --hypo-dir=/tmp/wiki-audit \
            --no-hooks --no-git-init
      - name: session-audit smoke (empty index → fallback)
        run: |
          node scripts/session-audit.mjs \
            --hypo-dir=/tmp/wiki-audit \
            --json > /tmp/audit.json
          test -s /tmp/audit.json
          node -e "const o=require('/tmp/audit.json'); if(!Array.isArray(o.results))process.exit(1);"
      - name: weekly-report smoke (--write to empty wiki)
        run: |
          node scripts/weekly-report.mjs \
            --hypo-dir=/tmp/wiki-audit \
            --week=2026-19 --write
          test -f /tmp/wiki-audit/pages/observability/2026-19.md
