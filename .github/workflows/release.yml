name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for the publish-credential pre-check below. It NEVER publishes
  # for real (the publish job is gated to tag pushes) — it only runs `npm whoami`
  # + `npm publish --dry-run` to verify the NPM_TOKEN secret can still authenticate
  # BEFORE a real tag depends on it. Use it after rotating NPM_TOKEN.
  workflow_dispatch:

# Least privilege by default. Both jobs below declare their own `permissions:`
# block, which REPLACES this default rather than merging with it; this line only
# governs any job added later that forgets to.
permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    # Real publish runs ONLY on a tag push — a manual workflow_dispatch must never
    # publish (it is for the credential pre-check job only).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release (was read; bumped for gh release create)
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          # fetch-depth: 0 fetches full history, but actions/checkout still
          # materializes the *triggering tag* as a LIGHTWEIGHT local ref (it
          # fetches the commit by SHA, not the annotated tag object). So
          # `git rev-parse <tag>^{tag}` — how check-bilingual detects annotation
          # — fails in CI on a tag that is annotated on the remote. The explicit
          # tag re-fetch below restores the annotated object. (Verified: this
          # was the v1.3.0 release-gate false-fail.)
          fetch-depth: 0

      - name: Fetch annotated tag object
        # Without this, check-bilingual --tag sees the triggering tag as
        # lightweight (see checkout note above) and the bilingual gate
        # false-fails on a genuinely annotated tag.
        run: |
          git fetch --force origin \
            "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          git cat-file -t "${GITHUB_REF_NAME}"   # prints "tag" for annotated

      - uses: actions/setup-node@v5
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Validate version consistency (tag + all release channels)
        # Supersedes the old package.json-only tag check. Asserts the tag
        # AND every version-carrying file agree — package.json, package-lock.json,
        # .claude-plugin/{plugin,marketplace}.json, templates/hypo-config.md — so a
        # forgotten plugin/marketplace/lockfile bump hard-fails the release instead
        # of publishing a split-version plugin.
        run: node scripts/check-versions.mjs --tag "${GITHUB_REF_NAME}"

      - name: Plugin path smoke
        # The repo is dual-channel (npm + Claude Code plugin). Smoke the plugin
        # surfaces (manifest, hooks/hooks.json targets, command/skill files,
        # marketplace parity) so a broken plugin channel cannot ship green.
        run: node scripts/smoke-plugin.mjs

      - name: Validate bilingual release docs (CHANGELOG + annotated tag)
        run: |
          node scripts/check-bilingual.mjs --changelog
          node scripts/check-bilingual.mjs --tag "${GITHUB_REF_NAME}"

      - name: Validate README version reconcile (both languages)
        # The README-reconcile floor: the release version MUST appear in
        # README.md AND README.ko.md. README reconcile was dropped 3x (v1.2/v1.3.0/
        # v1.3.1) because no gate owned it. check-versions excludes the READMEs (they
        # carry prose HISTORY); this is their complement.
        run: node scripts/check-readme-version.mjs

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Validate tag body has no wiki tracker IDs
        # The GitHub Release below republishes the annotated tag body verbatim
        # (--notes-from-tag), so any FEAT-/IMPR-/ISSUE-/PRAC-/fix #N in it becomes
        # a public dangling pointer into the private wiki tracker. The file gate
        # (check-tracker-ids --all) never reads the tag body. Gate it BEFORE the
        # publish below, so a bad tag body fails the run before the irreversible
        # npm publish rather than after it. (changelog-pr-guide T4.)
        run: node scripts/check-tracker-ids.mjs --tag "${GITHUB_REF_NAME}"

      - name: Publish
        # Idempotent: re-running a release (e.g. after the GitHub Release step
        # below failed) must not 409 on an already-published version. Skip the
        # PUT only when this EXACT version is already on the registry; a
        # genuinely new version still hard-publishes (keyed on
        # `npm view <name>@<version>`). A network/lookup failure falls through to
        # publish — never a silent skip that would read as "shipped".
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "hypomnema@${VERSION}" version >/dev/null 2>&1; then
            echo "hypomnema@${VERSION} already published — skipping npm publish"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        # Publish the GitHub Release from the annotated tag body (already
        # bilingual-validated above). Idempotent: skip if a Release for this tag
        # already exists, so a re-run does not error. Past v1.x Releases were
        # hand-created — this automates them on every tag push.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${GITHUB_REF_NAME} already exists — skipping"
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --notes-from-tag
          fi

  publish-precheck:
    name: Publish credential pre-check (never publishes)
    # Runs ONLY on manual dispatch — validates the NPM_TOKEN secret WITHOUT
    # publishing, so a credential rotation can be sanity-checked before a real
    # tag depends on it. The v1.2.x → E404 outage (CI token lost publish
    # capability; packages were published manually) is the failure class this
    # surfaces early. SCOPE LIMIT (honest): this proves the token authenticates
    # and — best effort — that its identity has read-write on the package. It
    # CANNOT prove the final registry PUT or the `--provenance` signing path;
    # only a real tag publish exercises those.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Verify token authenticates and has publish access
        # `npm whoami` resolves the token to an npm identity (a revoked/invalid
        # token fails here). `npm access list collaborators` then surfaces that
        # identity's permission on the package — read-write is required to
        # publish. A narrowly-scoped token may not be allowed to list
        # collaborators; that is downgraded to a warning (whoami already proved
        # auth), not a hard failure.
        run: |
          WHO=$(npm whoami)
          echo "authenticated as: $WHO"
          PERM=$(npm access list collaborators hypomnema --json 2>/dev/null \
            | node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8")||"{}"); process.stdout.write(d[process.argv[1]]||"")' "$WHO" 2>/dev/null || true)
          if [ -z "$PERM" ]; then
            echo "::warning::could not determine $WHO's permission on hypomnema (token may be narrowly scoped) — whoami succeeded, but publish access is unverified"
          elif [ "$PERM" != "read-write" ]; then
            echo "::error::$WHO has '$PERM' on hypomnema — read-write is required to publish"
            exit 1
          else
            echo "$WHO has read-write (publish) access ✓"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run publish (build + prepublishOnly, no PUT)
        # `--dry-run` packs the tarball and runs prepublishOnly
        # (test/lint/smoke-pack/check:bilingual) but performs NO registry PUT, so
        # nothing is published.
        #
        # Historical note (precheck-254): this `--dry-run` exports
        # `npm_config_dry_run=true` into the lifecycle env, which leaked into
        # smoke-pack's nested `npm pack` — making it a no-op that wrote no tarball,
        # so the nested `npm install` died with ENOENT (exit 254). Fixed in
        # scripts/smoke-pack.mjs by stripping `npm_config_dry_run` for its nested
        # npm calls. (NOT a missing-token problem — that was an earlier wrong
        # theory.) NODE_AUTH_TOKEN is kept below to mirror the real publish job's
        # environment, so this dry-run stays representative.
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
